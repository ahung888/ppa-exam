<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e3a8a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Document card -->
  <rect x="108" y="86" width="296" height="332" rx="20" fill="white" filter="url(#card-shadow)"/>

  <!-- Card header bar -->
  <rect x="108" y="86" width="296" height="70" rx="20" fill="#1d4ed8"/>
  <rect x="108" y="126" width="296" height="30" fill="#1d4ed8"/>

  <!-- Header: 採購法 -->
  <text x="256" y="135" text-anchor="middle" font-size="32" font-weight="700"
        fill="white" font-family="'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif"
        letter-spacing="4">採購法</text>

  <!-- Question text lines -->
  <rect x="138" y="182" width="236" height="11" rx="5.5" fill="#bfdbfe"/>
  <rect x="138" y="201" width="178" height="11" rx="5.5" fill="#bfdbfe"/>

  <!-- Option A (correct - green fill) -->
  <circle cx="155" cy="242" r="11" fill="#22c55e"/>
  <polyline points="149,242 154,247 163,234"
            fill="none" stroke="white" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="176" y="236" width="148" height="11" rx="5.5" fill="#bbf7d0"/>

  <!-- Option B -->
  <circle cx="155" cy="276" r="11" fill="none" stroke="#93c5fd" stroke-width="2.5"/>
  <rect x="176" y="270" width="128" height="11" rx="5.5" fill="#e2e8f0"/>

  <!-- Option C -->
  <circle cx="155" cy="310" r="11" fill="none" stroke="#93c5fd" stroke-width="2.5"/>
  <rect x="176" y="304" width="140" height="11" rx="5.5" fill="#e2e8f0"/>

  <!-- Option D -->
  <circle cx="155" cy="344" r="11" fill="none" stroke="#93c5fd" stroke-width="2.5"/>
  <rect x="176" y="338" width="112" height="11" rx="5.5" fill="#e2e8f0"/>

  <!-- Green checkmark badge (bottom-right, within safe zone circle r=204) -->
  <!-- center (358,358): dist from (256,256) = sqrt(102²+102²) ≈ 144, +50 = 194 < 204 ✓ -->
  <circle cx="358" cy="358" r="52" fill="#16a34a" stroke="white" stroke-width="6"/>
  <polyline points="334,358 351,375 384,335"
            fill="none" stroke="white" stroke-width="11"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
