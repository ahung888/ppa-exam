<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採購法測驗助手</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="採購法">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HLLT22GC39"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HLLT22GC39');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .nav-btn { transition: background-color 0.15s, color 0.15s; }
    .option-btn { transition: border-color 0.1s, background-color 0.1s; }
    #ai-modal { backdrop-filter: blur(2px); }
    #sidebar { transition: transform 0.22s ease, width 0.22s ease; overflow: hidden; }
    @media (min-width: 768px) {
      #sidebar.desktop-collapsed { width: 3.5rem; }
      #sidebar.desktop-collapsed .sidebar-header-text,
      #sidebar.desktop-collapsed .sidebar-label,
      #sidebar.desktop-collapsed .sidebar-bottom { display: none; }
      #sidebar.desktop-collapsed .sidebar-header { justify-content: center; padding-left: 0.5rem; padding-right: 0.5rem; }
      #sidebar.desktop-collapsed .sidebar-nav { padding-left: 0.25rem; padding-right: 0.25rem; }
      #sidebar.desktop-collapsed .nav-btn { display: flex; justify-content: center; padding-left: 0; padding-right: 0; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen md:flex md:h-screen md:overflow-hidden">

  <!-- Mobile header (hidden on desktop) -->
  <header class="md:hidden sticky top-0 z-30 bg-white border-b border-gray-200 flex items-center justify-between px-4 py-3 shrink-0">
    <button onclick="toggleMobileMenu()" class="p-1.5 rounded-lg text-gray-600 hover:bg-gray-100">
      <svg id="menu-icon-open" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <svg id="menu-icon-close" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <span class="font-bold text-blue-700 text-sm">採購法測驗助手</span>
    <span id="mobile-countdown" class="text-xs text-gray-500"></span>
  </header>

  <!-- Mobile overlay backdrop -->
  <div id="mobile-overlay" onclick="closeMobileMenu()"
    class="hidden fixed inset-0 bg-black bg-opacity-40 z-30 md:hidden"></div>

  <!-- Sidebar: fixed overlay on mobile, static on desktop -->
  <nav id="sidebar"
    class="-translate-x-full fixed inset-y-0 left-0 w-64 z-40 bg-white border-r border-gray-200 flex flex-col shadow-xl
           md:translate-x-0 md:relative md:w-52 md:shadow-sm md:z-auto">
    <div class="sidebar-header px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <div class="sidebar-header-text min-w-0 mr-2">
        <h1 class="text-base font-bold text-blue-700 leading-tight">採購法測驗助手</h1>
        <p class="text-xs text-gray-400 mt-0.5 flex items-center gap-1">
          <span id="countdown-text">距考試日計算中…</span>
          <button onclick="openExamDateModal()" title="設定考試日期"
            class="inline-flex text-gray-300 hover:text-blue-400 leading-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-1.414.586H9v-1.414a2 2 0 01.586-1.414z"/>
            </svg>
          </button>
        </p>
      </div>
      <button onclick="toggleDesktopSidebar()" id="desktop-sidebar-toggle" title="收合側欄"
        class="hidden md:flex items-center justify-center w-7 h-7 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 shrink-0">
        <svg id="sidebar-collapse-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
        </svg>
        <svg id="sidebar-expand-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
    <ul class="sidebar-nav flex-1 py-3 space-y-0.5 px-2">
      <li>
        <button onclick="navigate('dashboard')" id="nav-dashboard" title="數據看板"
          class="nav-btn w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
          <span class="sidebar-icon">📊</span><span class="sidebar-label">數據看板</span>
        </button>
      </li>
      <li>
        <button onclick="navigate('practice')" id="nav-practice" title="單元刷題"
          class="nav-btn w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
          <span class="sidebar-icon">📝</span><span class="sidebar-label">單元刷題</span>
        </button>
      </li>
      <li>
        <button onclick="navigate('review')" id="nav-review" title="錯題複習"
          class="nav-btn w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
          <span class="sidebar-icon">🔁</span><span class="sidebar-label">錯題複習</span>
        </button>
      </li>
      <li>
        <button onclick="navigate('author')" id="nav-author" title="關於作者"
          class="nav-btn w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
          <span class="sidebar-icon">👤</span><span class="sidebar-label">關於作者</span>
        </button>
      </li>
    </ul>
    <div class="sidebar-bottom px-4 pb-4 space-y-2">
      <div class="text-xs text-gray-400" id="sidebar-total"></div>
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-gray-400 mr-0.5">字級</span>
        <button onclick="setFontSize(0)" id="font-btn-0"
          class="w-7 h-7 rounded-lg border text-xs font-medium leading-none transition-colors">A</button>
        <button onclick="setFontSize(1)" id="font-btn-1"
          class="w-7 h-7 rounded-lg border text-sm font-medium leading-none transition-colors">A</button>
        <button onclick="setFontSize(2)" id="font-btn-2"
          class="w-7 h-7 rounded-lg border text-base font-medium leading-none transition-colors">A</button>
        <button onclick="setFontSize(3)" id="font-btn-3"
          class="w-7 h-7 rounded-lg border text-lg font-medium leading-none transition-colors">A</button>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-gray-400">熟練門檻</span>
        <input type="number" id="mastery-threshold-input" min="2" max="10" value="3"
          onchange="saveMasteryThreshold(this.value)"
          class="w-12 px-1 py-0.5 border border-gray-200 rounded-lg text-xs text-center focus:outline-none focus:ring-1 focus:ring-blue-200">
        <span class="text-xs text-gray-400">連正</span>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main id="app-content" class="p-4 md:p-6 md:flex-1 md:overflow-y-auto">
  </main>

  <!-- AI Modal -->
  <div id="ai-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 class="font-semibold text-gray-800">🤖 AI 老師提示詞</h3>
        <button onclick="closeAIModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>
      <div class="px-6 py-4">
        <p class="text-xs text-gray-500 mb-2">複製後貼到 ChatGPT / Claude 等 AI 助手詢問</p>
        <textarea id="ai-prompt-text" readonly
          class="w-full h-52 text-xs text-gray-700 border border-gray-200 rounded-xl p-3 font-mono resize-none leading-relaxed bg-gray-50 focus:outline-none"></textarea>
      </div>
      <div class="px-6 pb-5 flex items-center gap-3">
        <button onclick="copyAIPrompt()"
          class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">
          📋 複製到剪貼簿
        </button>
        <button onclick="closeAIModal()"
          class="px-5 py-2.5 border border-gray-200 text-gray-600 rounded-xl text-sm hover:bg-gray-50">
          關閉
        </button>
      </div>
      <p id="ai-copy-status" class="hidden text-xs text-green-600 text-center pb-4">✓ 已複製！</p>
    </div>
  </div>

  <!-- Exam Date Modal -->
  <div id="exam-date-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 class="font-semibold text-gray-800">📅 設定考試日期</h3>
        <button onclick="closeExamDateModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>
      <div class="px-6 py-4">
        <label class="text-sm text-gray-600 block mb-2">請選擇考試日期</label>
        <input type="date" id="exam-date-input"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
      </div>
      <div class="px-6 pb-5 flex items-center gap-3">
        <button onclick="saveExamDate()"
          class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">儲存</button>
        <button onclick="closeExamDateModal()"
          class="px-5 py-2.5 border border-gray-200 text-gray-600 rounded-xl text-sm hover:bg-gray-50">取消</button>
      </div>
    </div>
  </div>

  <script src="data/questions.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      function showUpdateToast(worker) {
        if (document.getElementById('sw-update-toast')) return;

        if (!document.getElementById('sw-toast-style')) {
          const s = document.createElement('style');
          s.id = 'sw-toast-style';
          s.textContent = '@keyframes sw-slide-up{from{opacity:0;transform:translateX(-50%) translateY(1rem)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
          document.head.appendChild(s);
        }

        const toast = document.createElement('div');
        toast.id = 'sw-update-toast';
        toast.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:0.6rem;background:#1d4ed8;color:#fff;padding:0.75rem 1.25rem;border-radius:0.75rem;box-shadow:0 4px 24px rgba(0,0,0,0.2);font-size:0.875rem;cursor:pointer;white-space:nowrap;animation:sw-slide-up 0.3s ease';
        toast.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" style="width:1rem;height:1rem;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span>有新版本，點此更新</span>';
        toast.addEventListener('click', () => {
          worker.postMessage({ type: 'SKIP_WAITING' });
          toast.remove();
        });
        document.body.appendChild(toast);
      }

      navigator.serviceWorker.register('./sw.js').then(reg => {
        if (reg.waiting) showUpdateToast(reg.waiting);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateToast(newWorker);
            }
          });
        });
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
